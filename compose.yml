x-voice-common: &voice-common
  environment: &voice-env
    CHATSUNE_VOICE_MODEL_CACHE_DIR: /models
    STT_MODEL: ${STT_MODEL:-h2oai/faster-whisper-large-v3-turbo}
    TTS_CUSTOM_VOICE_MODEL: ${TTS_CUSTOM_VOICE_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
    TTS_VOICE_DESIGN_MODEL: ${TTS_VOICE_DESIGN_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign}
    TTS_ENABLED_MODES: ${TTS_ENABLED_MODES:-custom_voice,voice_design}
    TTS_VRAM_POLICY: ${TTS_VRAM_POLICY:-keep_loaded}
    TTS_ATTENTION_IMPL: ${TTS_ATTENTION_IMPL:-sdpa}
    PRELOAD_AT_STARTUP: ${PRELOAD_AT_STARTUP:-true}
    DEVICE: ${DEVICE:-cuda}
    LOG_LEVEL: ${LOG_LEVEL:-info}
    STT_MAX_AUDIO_BYTES: ${STT_MAX_AUDIO_BYTES:-26214400}
    APP_PORT: ${APP_PORT:-8000}
  volumes:
    - ${MODEL_CACHE_DIR:-./models}:/models
  ports:
    - "${APP_PORT:-8000}:8000"
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 120s

services:
  voice-cuda:
    <<: *voice-common
    profiles: [cuda]
    image: ${APP_IMAGE:-ghcr.io/symphonic-navigator/chatsune-voice:cuda-latest}
    build:
      context: .
      dockerfile: Dockerfile.cuda
      args:
        INSTALL_FLASH_ATTN: ${INSTALL_FLASH_ATTN:-0}
    runtime: nvidia
    environment:
      <<: *voice-env
      NVIDIA_VISIBLE_DEVICES: all

  voice-rocm:
    <<: *voice-common
    profiles: [rocm]
    image: ${APP_IMAGE:-ghcr.io/symphonic-navigator/chatsune-voice:rocm-latest}
    build:
      context: .
      dockerfile: Dockerfile.rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    # No explicit group_add: the rocm/pytorch image runs as root and
    # the /dev/kfd + /dev/dri device grants provide enough access via
    # the kernel. Adding `video` or `render` groups here fails on hosts
    # where those groups do not exist (e.g. Arch/CachyOS). Operators
    # who intentionally build custom non-root images on distros that
    # do have a `render` group can add the groups back locally.
    environment:
      <<: *voice-env
      HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-11.5.1}
